name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  detector-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync --group dev

      - run: bash scripts/run_detector_quality.sh
